apiVersion: v1
kind: Secret
metadata:
  name: vault-approle-creds
  namespace: {{ .Values.global.namespaceIls }}
type: Opaque
stringData:
  roleId: {{ .Values.global.namespaceIls }}
  secretRef: vault-approle-creds
---
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: secretstore-vault-backend
  namespace:  $ns
spec:
  provider:
    vault:
      server: "$URL_VAULT"
      path: "secret"
      version: "v2"
      auth:
        appRole:
          roleId: $ROLEID
          secretRef:
            key: secret-id
            name: vault-approle-creds
      path: "secret"
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: ibm-license-service-reporter-token
  namespace: $ns
spec:
  refreshInterval: "1m"
  secretStoreRef:
    name: secretstore-vault-backend
    kind: SecretStore
  target:
    name: ibm-license-service-reporter-token
    creationPolicy: Owner
  data:
  - secretKey: token
    remoteRef:
      key: argocd/token/reporter_ils
      property: token
EOF

